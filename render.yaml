services:
  - type: web
    name: asl-sign-language-detection
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --worker-class geventwebsocket.gunicorn.workers.GeventWebSocketWorker -w 1 --bind 0.0.0.0:$PORT --timeout 120 app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: TF_ENABLE_ONEDNN_OPTS
        value: "0"
    plan: free
    rootDir: webapp
